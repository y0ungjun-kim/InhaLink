spring:
  application:
    name: inhalink-backend

  # 1. MySQL 연결 설정
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/inhalink?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${spring.datasource.password}

  # 2. JPA/Hibernate 설정 (테이블 자동 생성의 핵심)
  jpa:
    hibernate:
      ddl-auto: update # 엔티티 변경사항을 DB 테이블에 자동으로 반영
    show-sql: true     # 실행되는 SQL 쿼리를 콘솔에 출력
    properties:
      hibernate:
        format_sql: true # SQL을 보기 좋게 정렬

  # 3. Redis 설정 (인증번호용)
  data:
    redis:
      host: localhost
      port: 6379